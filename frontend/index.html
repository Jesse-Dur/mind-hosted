<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <title>Mind</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #f5f5f5;
        color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      #splash {
        position: fixed; inset: 0; background: #f5f5f5;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-ring {
        position: relative; width: 12vmin; height: 12vmin;
        display: flex; align-items: center; justify-content: center;
      }
      #splash-ring svg {
        position: absolute; inset: 0; width: 100%; height: 100%;
        animation: _spin 2.5s linear infinite;
      }
      #splash-ring img {
        width: 55%; height: 55%;
        animation: _pulse 1.2s ease-in-out infinite alternate;
      }
      @keyframes _spin { to { transform: rotate(360deg) } }
      @keyframes _pulse { from { opacity: 1 } to { opacity: 0.4 } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-ring">
        <svg viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="44" fill="none" stroke="#e0e0e0" stroke-width="2.5"/>
          <path d="M 48 4 A 44 44 0 0 1 92 48" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <img src="/favicon.svg" alt="Mind">
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
